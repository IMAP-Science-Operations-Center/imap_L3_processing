epoch:
  NAME: epoch
  DATA_TYPE: CDF_TIME_TT2000
  CATDESC: Time, number of nanoseconds since J2000 with leap seconds included
  VAR_TYPE: support_data
  RECORD_VARYING: RV
  FIELDNAM: Epoch
  FORMAT: ' '
  LABLAXIS: Epoch
  UNITS: ns
  VALIDMIN: 1990-01-01T00:00:00.000000000
  VALIDMAX: 2099-12-31T00:00:00.000000000
  FILLVAL: 9999-12-31T23:59:59.999999999
  TIME_BASE: J2000
  TIME_SCALE: TT
  MONOTON: INCREASE
  REFERENCE_POSITION: Rotating Earth Geoid
  SCALETYP: linear
  SI_CONVERSION: 1e-9>seconds
energy_grid:
  NAME: energy_grid
  DATA_TYPE: CDF_FLOAT
  CATDESC: Energies associated with the survival probabilities for IMAP-Hi
  VAR_TYPE: support_data
  RECORD_VARYING: NRV
  FIELDNAM: Energy
  FORMAT: g9.3
  LABLAXIS: energy
  UNITS: keV
  VALIDMIN: 0
  VALIDMAX: 10000000000
  FILLVAL: -1.0000E+31
  SCALETYP: log
spin_angle:
  NAME: spin_angle
  DATA_TYPE: CDF_FLOAT
  CATDESC: Angle on the circle around axis rotation, with the radius elongation angle. The 0 spin_angle is the direction nearest north pole.
  VAR_TYPE: support_data
  RECORD_VARYING: NRV
  FIELDNAM: Spin Angle
  FORMAT: g9.3
  LABLAXIS: spin angle
  UNITS: degrees
  VALIDMIN: 0
  VALIDMAX: 360
  FILLVAL: -1.0000E+31
  SCALETYP: linear
surv_prob:
  NAME: surv_prob
  DATA_TYPE: CDF_DOUBLE
  CATDESC: Survival probabilities for IMAP-Hi
  VAR_TYPE: data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DEPEND_1: energy_grid
  DEPEND_2: spin_angle
  DISPLAY_TYPE: spectrogram
  VARIABLE_PURPOSE: PRIMARY_VAR,SUMMARY
  FIELDNAM: Probability Of Survival
  FORMAT: g9.3
  LABLAXIS: Probability of survival
  UNITS: ' '
  VALIDMIN: 0
  VALIDMAX: 1
  FILLVAL: -1.0000E+31
  LABL_PTR_1: energy_label
  LABL_PTR_2: spin_angle_label
  SCALETYP: linear
spin_axis_latitude:
  NAME: spin_axis_latitude
