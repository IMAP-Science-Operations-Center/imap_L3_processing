  LABLAXIS: Plasma speed
  DISPLAY_TYPE: spectrogram
  UNITS: km/s
  VALIDMIN: 0
  VALIDMAX: 10000
  FILLVAL: -1.00E+31
  SCALETYP: linear
  DEPEND_0: epoch
  DEPEND_1: lat_grid
  LABL_PTR_1: lat_grid_label
proton_density:
