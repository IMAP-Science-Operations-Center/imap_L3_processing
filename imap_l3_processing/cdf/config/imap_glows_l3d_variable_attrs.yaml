  FIELDNAM: Carrington Rotation
  FORMAT: F9.3
  LABLAXIS: Carrington rotation
  UNITS: ' '
  VALIDMIN: 1000
  VALIDMAX: 3000
  FILLVAL: -1.00E+31
  SCALETYP: linear
plasma_speed:
  NAME: plasma_speed
  DATA_TYPE: CDF_DOUBLE
  CATDESC: Solar wind plasma speed
  VAR_TYPE: data
  RECORD_VARYING: RV
  VARIABLE_PURPOSE: PRIMARY_VAR,SUMMARY
