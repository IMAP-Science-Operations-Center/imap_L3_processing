  VAR_TYPE: support_data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DISPLAY_TYPE: time_series
  FIELDNAM: Latency
  FORMAT: I2
  LABLAXIS: Latency
  UNITS: ' '
  VALIDMIN: 0
  VALIDMAX: 16
  FILLVAL: 255
stim_tag:
  NAME: stim_tag
