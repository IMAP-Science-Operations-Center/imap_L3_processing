epoch:
  NAME: epoch
  DATA_TYPE: CDF_TIME_TT2000
  CATDESC: Time, number of nanoseconds since J2000 with leap seconds included
  VAR_TYPE: support_data
  RECORD_VARYING: RV
  FIELDNAM: Epoch
  FORMAT: ' '
  LABLAXIS: Epoch
  UNITS: ns
  VALIDMIN: 1990-01-01T00:00:00.000000000
  VALIDMAX: 2099-12-31T00:00:00.000000000
  FILLVAL: 9999-12-31T23:59:59.999999999
  TIME_BASE: J2000
  TIME_SCALE: TT
  DELTA_PLUS_VAR: epoch_delta
  DELTA_MINUS_VAR: epoch_delta
  MONOTON: INCREASE
  REFERENCE_POSITION: Rotating Earth Geoid
  SCALETYP: linear
  SI_CONVERSION: 1e-9>seconds
epoch_delta:
  NAME: epoch_delta
  DATA_TYPE: CDF_INT8
  CATDESC: Epoch delta
  VAR_TYPE: support_data
  RECORD_VARYING: RV
  FIELDNAM: Epoch Delta
  FORMAT: I19
  LABLAXIS: Epoch delta
  UNITS: ns
  VALIDMIN: 0
  VALIDMAX: 86000000000000
  FILLVAL: -9223372036854775808
  DEPEND_0: epoch
  SCALETYP: linear
charge:
  NAME: charge
  DATA_TYPE: CDF_FLOAT
  CATDESC: Particle atomic charge (element) estimate (float)
  VAR_TYPE: data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DISPLAY_TYPE: time_series
  VARIABLE_PURPOSE: PRIMARY_VAR,SUMMARY
  FIELDNAM: Charge
  FORMAT: F15.3
  LABLAXIS: Charge
  UNITS: ' '
  VALIDMIN: 0
  VALIDMAX: 200
  FILLVAL: -1.00E+31
energy:
  NAME: energy
  DATA_TYPE: CDF_FLOAT
  CATDESC: Energy (sum of all delta-Es with cosine correction)
  VAR_TYPE: data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DISPLAY_TYPE: time_series
  VARIABLE_PURPOSE: PRIMARY_VAR,SUMMARY
  FIELDNAM: Energy
  FORMAT: F15.3
  LABLAXIS: Energy
  UNITS: MeV
  VALIDMIN: 0.1
  VALIDMAX: 10000
  FILLVAL: -1.00E+31
  SCALEMIN: 0.1
  SCALEMAX: 10000
energy_in_detector:
  NAME: energy_in_detector
  DATA_TYPE: CDF_FLOAT
  CATDESC: Energy in detector (delta-E in detector_id detector with cosine correction)
  VAR_TYPE: support_data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DEPEND_1: detector_id
  DISPLAY_TYPE: spectrogram
  FIELDNAM: Energy In Detector
  FORMAT: F15.3
  LABLAXIS: Detector delta-E
  UNITS: MeV
  VALIDMIN: 0.1
  VALIDMAX: 10000
  FILLVAL: -1.00E+31
  SCALEMIN: 0.1
  SCALEMAX: 10000
range:
  NAME: range
  DATA_TYPE: CDF_UINT1
  CATDESC: Particle range (2 = L1L2, 3=L1L2L3, 4=L1L2L3L3)
  VAR_TYPE: support_data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DISPLAY_TYPE: timeseries
  FIELDNAM: Range
  FORMAT: I4
  LABLAXIS: Range
  UNITS: ' '
  VALIDMIN: 0
  VALIDMAX: 4
  FILLVAL: 255
delta_e:
  NAME: delta_e
  DATA_TYPE: CDF_FLOAT
  CATDESC: Delta E (energy deposited in detector that particle fully penetrates)
  VAR_TYPE: data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DISPLAY_TYPE: time_series
  VARIABLE_PURPOSE: PRIMARY_VAR,SUMMARY
  FIELDNAM: Delta E
  FORMAT: F15.3
  LABLAXIS: Delta E
  UNITS: MeV
  VALIDMIN: 0.1
  VALIDMAX: 10000
  FILLVAL: -1.00E+31
  SCALEMIN: 0.1
  SCALEMAX: 10000
e_prime:
  NAME: e_prime
  DATA_TYPE: CDF_FLOAT
  CATDESC: E prime (energy deposited in stopping detector)
  VAR_TYPE: data
  RECORD_VARYING: RV
  DEPEND_0: epoch
  DISPLAY_TYPE: time_series
  VARIABLE_PURPOSE: PRIMARY_VAR,SUMMARY
  FIELDNAM: E Prime
  FORMAT: F15.3
  LABLAXIS: E prime
  UNITS: MeV
  VALIDMIN: 0.1
  VALIDMAX: 10000
  FILLVAL: -1.00E+31
  SCALEMIN: 0.1
  SCALEMAX: 10000
particle_id:
  NAME: particle_id
  DATA_TYPE: CDF_UINT2
  CATDESC: Particle Id (instrument internal identification number)
